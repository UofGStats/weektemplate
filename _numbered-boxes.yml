# This file contains specifications for coloured numbered boxes
# The extension doesn't support dark-mode, so overrides are defined
# in the themes/dark-styles-boxes.scss file

crossref:
  chapters: true

custom-numbered-blocks:
  groups:
    examplelike:
      colors: [ 'b2dac4', '004721']
      boxstyle: foldbox.simple
    tasklike:
      colors: [948bde, 584eab]
      boxstyle: foldbox.simple
    anslike:
      colors: [ d18888, 660000]
      boxstyle: foldbox.simple
    deflike:
      colors: [ ffdc36, ffb948]
      boxstyle: foldbox.simple
    videolike:
      colors: [c7f3fc, 7ee3f8] #[ d18888, 660000] 
      boxstyle: foldbox.simple
      collapse: open
    thmlike:
      colors: [948bde, 584eab]
      boxstyle: foldbox.simple
    supplike:
      colors: [c7f3fc, 7ee3f8]
      boxstyle: foldbox.simple
      collapse: true
    keylike:
      colors: [ff7833, be4d00]
      boxstyle: foldbox.simple
  classes:
    Example:
      group: examplelike
      collapse: false
    Task:
      group: tasklike
      collapse: false
    Answer:
      group: anslike
      collapse: true
    Weblink:
      group: videolike
      collapse: false
      label: "External link"
    Definition:
      group: deflike
      collapse: false
    Theorem:
      group: thmlike
      collapse: false
    Lemma:
      colors: [ 'b2dac4', '004721']
      group: thmlike
    Corollary:
      colors: [ '7fbad7', '005398']
      group: thmlike
    Video:
      group: videolike
    Supplement:
      group: supplike
    Key:
      group: keylike
      label: "Key Idea"
      collapse: false
      