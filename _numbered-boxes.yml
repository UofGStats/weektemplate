# This file contains specifications for coloured numbered boxes
# The extension doesn't support dark-mode, so overrides are defined
# in the themes/dark-styles-boxes.scss file

crossref:
  chapters: true

custom-numbered-blocks:
  groups:
    examplelike:
      colors: [ 'b2dac4', '004721']
      boxstyle: foldbox.simple
      collapse: false
    tasklike:
      colors: [948bde, 584eab]
      boxstyle: foldbox.simple
      collapse: false
    anslike:
      colors: [ d18888, 660000]
      boxstyle: foldbox.simple
      collapse: true
    deflike:
      colors: [ ffdc36, ffb948]
      boxstyle: foldbox.simple
      collapse: false
    videolike:
      colors: [c7f3fc, 7ee3f8] #[ d18888, 660000] 
      boxstyle: foldbox.simple
      collapse: true
    thmlike:
      colors: [948bde, 584eab]
      boxstyle: foldbox.simple
      collapse: false
    supplike:
      colors: [c7f3fc, 7ee3f8]
      boxstyle: foldbox.simple
      collapse: true
    keylike:
      colors: [ff7833, be4d00]
      boxstyle: foldbox.simple
      collapse: false
    outcomeslike:
      colors: ['00b5d1', '005398']
      boxstyle: foldbox.simple
  classes:
    Example:
      group: examplelike
    Task:
      group: tasklike
    Answer:
      group: anslike
    Weblink:
      group: videolike
      label: "External link"
    Definition:
      group: deflike
    Theorem:
      group: thmlike
    Lemma:
      colors: [ 'b2dac4', '004721']
      group: thmlike
    Corollary:
      colors: [ '7fbad7', '005398']
      group: thmlike
    Video:
      group: videolike
    Supplement:
      group: supplike
    Key:
      group: keylike
      label: "Key Idea"
    Outcomes:
      group: outcomeslike
      label: "Learning Outcomes"
      collapse: false
