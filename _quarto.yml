project:
  resources: ["resources"] # List files/folders here which need copying to live version, but which aren't explicitly referenced (e.g. numbas folders)
  output-dir: _preview
  type: website

### YOU WILL WANT TO DEFINE THE course_title ON THE NEXT LINE ###
course_title: "Test Course"
pagetitle: "{{< meta course_title >}} - {{< meta week_title >}}" # This will be the browser tab's name
metadata-files: 
  - _numbered-boxes.yml # Definitions for Ute Hahn's coloured boxes extension
                        # the contents can be pasted here if desired instead, this is neater


extensions:
  - ute/custom-numbered-blocks
  - UofGStats/acc-tools
  - david-hodge/invis
  - david-hodge/iframe
  - quarto-ext/fontawesome
  - quarto-ext/latex-environment

knitr: true

#bibliography: references.bib # unused
reference-location: block # Print internal annotations/refs below block where they appear.

# Defines a new float so we can use :::{#vid-<label>} and it calls it a "Video"
crossref:
   custom:
    - kind: float
      reference-prefix: Video
      key: vid
      latex-env: video

website:
  page-footer:
    right: "Developed by David Hodge for the University of Glasgow"
  sidebar:
    - id: Weekly
      style: "floating"
      search: true
      header: |
        <div class="book-title-section">
          <img src="../resources/logos/MandS-logo.png"
               class="sidebar-logo"
               alt="Logo of the School of Mathematics and Statistics at the University of Glasgow">
          <h2 class="sidebar-title"><span>{{< meta course_title >}}</span></h2>
          <p class="sidebar-subtitle"><span>{{< meta week_title >}}</span></p>
        </div>
      footer: |
        <div class="quarto-other-formats-target"></div>
    - id: hub
      style: "docked"
      search: false
      header: |
        <div class="book-title-section">
          <img src="../resources/logos/MandS-logo.png"
               class="sidebar-logo"
               alt="Logo of the School of Mathematics and Statistics at the University of Glasgow">
          <h2 class="sidebar-title"><span>{{< meta course_title >}}</span></h2>
          <p class="sidebar-subtitle"><span>{{< meta week_title >}}</span></p>
        </div>
      footer: |
        <div class="quarto-other-formats-target"></div>
      contents:
      - text: "Doing headings (edit)"
        href: Ch1/Ch1.html
      - text: "Code demos (edit)"
        href: Ch2/Ch2.html
      - text: "How to link (edit)"
        href: Ch3/Ch3.html
      - text: "Nicer boxes and Python (edit)"
        href: Ch4/Ch4.html
      - text: "Webexercises and Numbas (edit)"
        href: Ch5/Ch5.html
      - text: "Invisible text (edit)"
        href: Ch6/Ch6.html
      - text: "Sample chapter from APM (edit)"
        href: ChX/Week2.html
      
# My filters
filters:
  - latex-environment # This saves having to type data-latex="" all the time (and enables 'term' styling)
  - fontawesome # This loads a large bank of nice icons
  - custom-numbered-blocks # These are the nice coloured boxes
  - invis # This allows hidden text
  - iframe # This allows embedding iframe, e.g. Numbas questions
  
environments: [term] # Needs latex-environment above (and see below)
commands: [term] # Allows consistent highlighting of key terms
use-rsvg-convert: true # Auto-convert images into svg format
number-depth: 3 # How deep to number things?
format:
  html: # Settings for HTML output
    defaults: [resources/latex/global-maths-definitions.yaml] # Latex macros (see below)
    default-image-extension: svg
    highlight-style: a11y
    mainfont: "Atkinson Hyperlegible" # Primary font used
    code-overflow: wrap
    toc: true # Table of contents true/false
    toc-location: right # Location of table of contents
    toc-depth: 4 # How deep to go in table of contents
    number-sections: true
    #respect-user-color-scheme: true # Permit auto-dark mode if desired set by user
    theme:
      light: [themes/load-light.scss, cosmo]
      dark: [superhero, themes/load-dark.scss] # Remove this row to totally remove
    #include-after-body: disable-tippy-tab.js # Script to fully disable hover to show HTML links
  pdf: # Settings for PDF output
    documentclass: scrreprt
    default-image-extension: png
    keep-tex: true # Useful to be set to true for debugging the tex file
    papersize: a4
    toc-depth: 2
    number-sections: true
    include-in-header: ["include-in-header.tex"] # Latex macros and more. Macros need duplicating here (see above)
    code-block-overflow: wrap
    geometry: # Customize the margins of the PDF here.
      #- left=10mm # Narrow left margin
      - marginparwidth=60mm
      #- textwidth=130mm # Super-wide right margin for annotations
      - marginparsep=5mm


